<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MFEIA 运维台</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <h1>MFEIA 49 周年 · 运维台</h1>

    <section class="box">
      <h2>手动代签 / 新增嘉宾</h2>
      <div class="row">
        <input id="m-name" placeholder="姓名 *" />
        <input id="m-company" placeholder="公司 / 单位" />
        <select id="m-gender">
          <option value="unknown">称谓</option>
          <option value="male">先生</option>
          <option value="female">女士</option>
        </select>
        <button id="m-submit">签到</button>
      </div>
      <div id="m-msg" class="msg"></div>
    </section>

    <section class="box">
      <h2>大屏标语</h2>
      <div class="row">
        <input id="t-slogan" placeholder="大屏标语文字" style="flex:1; min-width:260px" />
        <button id="t-slogan-apply">应用</button>
      </div>
      <div id="t-msg" class="msg"></div>
    </section>

    <section class="box">
      <h2>赞助商 Logo</h2>
      <div class="row">
        <input type="file" id="s-file" accept="image/*" />
        <label>切换间隔(秒) <input type="number" id="s-interval" value="6" min="1" step="1" style="width:64px" /></label>
        <button id="s-interval-apply">应用秒数</button>
      </div>
      <ul id="s-list" class="list"></ul>
      <div id="s-msg" class="msg"></div>
    </section>

    <section class="box">
      <h2>已签到（点击可重新触发形象）<span id="total" class="total">0</span></h2>
      <input id="search" placeholder="搜索姓名 / 公司…" />
      <ul id="list" class="list"></ul>
    </section>

    <section class="box draw-box">
      <h2>抽奖 · 奖品管理</h2>
      <div class="row">
        <input id="p-name" placeholder="奖品名称 *" />
        <select id="p-level">
          <option value="grand">特等奖</option>
          <option value="second">二等奖</option>
          <option value="third">三等奖</option>
          <option value="lucky" selected>幸运奖</option>
        </select>
        <input id="p-sponsor" placeholder="赞助商（选填）" />
        <label>数量 <input type="number" id="p-qty" value="1" min="1" step="1" style="width:64px" /></label>
        <input type="file" id="p-file" accept="image/*" />
        <button id="p-add">添加奖品</button>
      </div>
      <ul id="p-list" class="list"></ul>
      <div id="p-msg" class="msg"></div>
    </section>

    <section class="box draw-box">
      <h2>抽奖控制台</h2>
      <div class="row">
        <select id="d-prize" style="flex:1; min-width:220px"></select>
        <button id="d-start" class="draw-go">开始 START</button>
        <button id="d-stop" class="draw-stop">停止揭晓 STOP</button>
        <button id="d-redraw">重抽 REDRAW</button>
        <button id="d-reset" class="ghost">清屏</button>
        <button id="d-fullscreen" class="ghost">全屏展示 ↗</button>
      </div>
      <div id="d-msg" class="msg"></div>
      <h2 style="margin: 18px 0 12px">中奖记录</h2>
      <ul id="w-list" class="list"></ul>
    </section>

    <script type="module" src="./admin.ts"></script>
  </body>
</html>
