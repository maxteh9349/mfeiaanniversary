<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>立绘预览 · Avatar Preview</title>
    <style>
      body { margin: 0; background: #0a1530; color: #eaf2ff; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; padding: 24px; }
      h1 { font-size: 20px; color: #38e1ff; }
      p.note { color: #8aa0c8; font-size: 13px; }
      .grid { display: flex; flex-wrap: wrap; gap: 18px; margin-top: 16px; }
      .card { background: rgba(14,28,64,.6); border: 1px solid rgba(56,225,255,.2); border-radius: 12px; padding: 12px; text-align: center; }
      .card canvas.body { width: 180px; height: 270px; display: block; }
      .row2 { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 8px; }
      .thumb { width: 56px; height: 56px; border-radius: 50%; border: 2px solid #38e1ff; background-size: cover; background-position: center top; }
      .label { font-size: 13px; color: #cfe8ff; }
      .toggle { margin-top: 10px; }
      .toggle button { background: #1a2a50; color: #eaf2ff; border: 1px solid rgba(56,225,255,.3); border-radius: 8px; padding: 6px 12px; cursor: pointer; }
      .chk { background-image: linear-gradient(45deg,#16223f 25%,transparent 25%),linear-gradient(-45deg,#16223f 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#16223f 75%),linear-gradient(-45deg,transparent 75%,#16223f 75%); background-size: 20px 20px; background-position: 0 0,0 10px,10px -10px,-10px 0; }
    </style>
  </head>
  <body>
    <h1>嘉宾立绘预览（8 个占位角色）</h1>
    <p class="note">这是代码绘制的占位立绘 + 头像缩略图。点击下方按钮可切换透明/棋盘背景。把 AI 成品命名 avatar0.png… 放进 assets/avatars/ 即替换。</p>
    <div class="toggle"><button id="bg">切换棋盘背景</button></div>
    <div id="grid" class="grid"></div>
    <script type="module" src="./preview.ts"></script>
  </body>
</html>
